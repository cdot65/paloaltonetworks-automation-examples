<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 200 200"
    width="200"
    height="200"
    aria-labelledby="title"
>
    <title id="title">Pomegranate Logo</title>

    <!-- Main pomegranate body -->
    <circle
        cx="100"
        cy="110"
        r="60"
        fill="#C0392B"
        stroke="#7B241C"
        stroke-width="2"></circle>

    <!-- Crown at the top -->
    <path
        fill="#A93226"
        d="
        M80,50
        Q85,30 90,50
        Q95,30 100,50
        Q105,30 110,50
        Q115,30 120,50
        Z
      "></path>

    <!-- A subtle highlight on the left side -->
    <ellipse
        cx="75"
        cy="95"
        rx="15"
        ry="25"
        fill="#FFFFFF"
        opacity="0.1"></ellipse>
</svg>
