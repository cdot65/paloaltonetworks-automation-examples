---
# 04-backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev-edl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/cdot65/edl-backend:dev
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dev-edl-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-edl-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dev-edl-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              value: "postgres.dev-edl.svc.cluster.local"
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: dev-edl-config
                  key: POSTGRES_PORT
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: dev-edl-config
                  key: FRONTEND_URL
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev-edl
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: backend
