---
# 00-namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: pomegranate

---
# 01-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: pomegranate-config
  namespace: pomegranate
data:
  POSTGRES_DB: "edl_db"
  POSTGRES_PORT: "5432"
  FRONTEND_URL: "https://edl.cdot.io"

---
# 02-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: pomegranate-secret
  namespace: pomegranate
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: bXlzZWNyZXRwYXNzd29yZA==
  DATABASE_URL: cG9zdGdyZXM6Ly9wb3N0Z3JlczpteXNlY3JldHBhc3N3b3JkQHBvc3RncmVzLnBvbWVncmFuYXRlLnN2Yy5jbHVzdGVyLmxvY2FsOjU0MzIvZWRsX2Ri

---
# 03-postgres.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: pomegranate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pomegranate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pomegranate-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pomegranate-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pomegranate-config
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data  # Add this line to avoid permission issues
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pomegranate
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres


---
# 04-backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pomegranate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/cdot65/pomegranate-backend:0.1.2
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pomegranate-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pomegranate-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pomegranate-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              value: "postgres.pomegranate.svc.cluster.local"
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: pomegranate-config
                  key: POSTGRES_PORT
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: pomegranate-config
                  key: FRONTEND_URL
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: pomegranate
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: backend


---
# 05-frontend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pomegranate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/cdot65/pomegranate-frontend:0.1.1
          imagePullPolicy: Always
          env:
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: pomegranate-config
                  key: FRONTEND_URL
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pomegranate
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend

---
# 06-traefik.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: pomegranate
data:
  traefik.yml: |
    api:
      dashboard: true
      insecure: true
    log:
      level: DEBUG
    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        address: ":443"
        http:
          tls: {}
    providers:
      kubernetesIngress: {}  # Changed this line
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: pomegranate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-account
      containers:
        - name: traefik
          image: traefik:v2.10
          args:
            - "--configFile=/etc/traefik/traefik.yml"
            - "--log.level=DEBUG"
            - "--accesslog=true"
            - "--providers.kubernetesingress.ingressclass=traefik"  # Added this line
          volumeMounts:
            - name: cert
              mountPath: /certs
              readOnly: true
            - name: traefik-config
              mountPath: /etc/traefik
              readOnly: true
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
      volumes:
        - name: cert
          secret:
            secretName: tls-cert
        - name: traefik-config
          configMap:
            name: traefik-config

---
# 07-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pomegranate-ingress
  namespace: pomegranate
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - edl.cdot.io
      secretName: tls-cert
  rules:
    - host: edl.cdot.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

---
# 08-ingressclass.yaml
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller

---
# 09-rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-account
  namespace: pomegranate
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: traefik-role
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - ingressclasses
    verbs:
      - get
      - list
      - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: traefik-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-role
subjects:
  - kind: ServiceAccount
    name: traefik-account
    namespace: pomegranate
